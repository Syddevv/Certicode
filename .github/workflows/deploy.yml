name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 📦 Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 📦 Install dependencies
      - name: Install dependencies
        run: npm install

      # 🔥 Build with ENV
      - name: Build project
        run: npm run build
        env:
          VITE_API_URL: https://api.commerce.certicode.tech
          VITE_FRONTEND_URL: https://commerce.certicode.tech

      # 🧹 Clean old files
      - name: Clean public_html
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            rm -rf ~/domains/commerce.certicode.tech/public_html/*

      # 🚀 Upload build files
      - name: Upload build files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          source: "dist/*"
          target: "~/domains/commerce.certicode.tech/public_html"
